<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline - Geographic Challenge</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, sans-serif;

      .card {
        max-width: 420px;
        background: white;
        border: 1px solid #e5e7eb;

  <body>
    <div class="card">
      <h1>You're offline</h1>
      <p>Basic gameplay works after first load. Reconnect to refresh map and country data.</p>
